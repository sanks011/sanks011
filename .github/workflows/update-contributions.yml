name: Update OSS Contributions

on:
  schedule:
    - cron: "0 0 * * 0"   # every Sunday midnight
  workflow_dispatch:        # run manually anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch merged PRs in external repos
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch last 500 PRs (all states) by sanks011 in external repos
          gh api graphql -f query='
            {
              user(login: "sanks011") {
                pullRequests(
                  first: 500
                  orderBy: { field: UPDATED_AT, direction: DESC }
                ) {
                  nodes {
                    state
                    repository {
                      nameWithOwner
                      owner { login }
                      description
                      url
                    }
                  }
                }
              }
            }
          ' > prs.json

          # Extract unique orgs, count PRs, create cards
          python3 - << 'PYEOF'
          import json, sys

          with open("prs.json") as f:
              data = json.load(f)

          # Exclude personal repos and friends' repos
          excluded_owners = ["sanks011", "sahnik0", "shovon0004", "abhijit5996", "shreyas0017"]

          prs = data["data"]["user"]["pullRequests"]["nodes"]
          orgs = {}
          
          for pr in prs:
              repo = pr["repository"]
              owner = repo["owner"]["login"]
              
              if owner.lower() in [e.lower() for e in excluded_owners]:
                  continue
              
              repo_name = repo["nameWithOwner"]
              if repo_name not in orgs:
                  orgs[repo_name] = {
                      "name": repo_name,
                      "url": repo["url"],
                      "description": repo.get("description", ""),
                      "open": 0,
                      "closed": 0,
                      "merged": 0
                  }
              
              state = pr["state"]
              if state == "OPEN":
                  orgs[repo_name]["open"] += 1
              elif state == "CLOSED":
                  orgs[repo_name]["closed"] += 1
              elif state == "MERGED":
                  orgs[repo_name]["merged"] += 1

          # Create cards for each org
          cards = []
          for org_name, info in orgs.items():
              total = info["open"] + info["closed"] + info["merged"]
              org_encoded = org_name.replace('/', '%2F')
              card = f'<a href="{info["url"]}"><img src="https://img.shields.io/badge/{org_encoded}-{total}_PRs-blue?style=for-the-badge&logo=github" alt="{org_name}" /></a>'
              cards.append(card)

          cards_html = "\n\n".join(cards)

          with open("README.md") as f:
              content = f.read()

          start = "<!-- OSS_CONTRIBUTIONS_START -->"
          end = "<!-- OSS_CONTRIBUTIONS_END -->"
          new_block = f"{start}\n<!-- auto-updated by .github/workflows/update-contributions.yml -->\n\n{cards_html}\n\n{end}"

          import re
          updated = re.sub(
              rf"{re.escape(start)}.*?{re.escape(end)}",
              new_block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(updated)

          print(f"Updated with {len(orgs)} organizations.")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update OSS contributions [skip ci]"
          git push