name: Daily System Telemetry & OSS Update

on:
  schedule:
    - cron: "0 * * * *"   # run hourly
  workflow_dispatch:        # run manually anytime

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch PRs with pagination
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create merge script
          cat > merge_prs.py << 'EOF'
          import json
          import sys
          
          with open('prs.json') as f:
              all_data = json.load(f)
          with open('page.json') as f:
              page_data = json.load(f)
          
          all_data['data']['user']['pullRequests']['nodes'].extend(
              page_data['data']['user']['pullRequests']['nodes']
          )
          
          with open('prs.json', 'w') as f:
              json.dump(all_data, f)
          
          page_info = page_data['data']['user']['pullRequests']['pageInfo']
          if page_info['hasNextPage']:
              print(page_info['endCursor'])
          else:
              print('DONE')
          EOF
          
          # Initialize empty result
          echo '{"data":{"user":{"pullRequests":{"nodes":[]}}}}' > prs.json
          
          CURSOR=""
          for page in 1 2 3 4 5; do
            echo "Fetching page $page..."
            
            if [ -z "$CURSOR" ]; then
              gh api graphql -f query='
                {
                  user(login: "sanks011") {
                    pullRequests(
                      first: 100
                      orderBy: { field: UPDATED_AT, direction: DESC }
                    ) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        state
                        repository {
                          nameWithOwner
                          owner { login }
                          description
                          url
                        }
                      }
                    }
                  }
                }
              ' > page.json
            else
              gh api graphql -f query='
                query($cursor: String!) {
                  user(login: "sanks011") {
                    pullRequests(
                      first: 100
                      after: $cursor
                      orderBy: { field: UPDATED_AT, direction: DESC }
                    ) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        state
                        repository {
                          nameWithOwner
                          owner { login }
                          description
                          url
                        }
                      }
                    }
                  }
                }
              ' -f cursor="$CURSOR" > page.json
            fi
            
            RESULT=$(python3 merge_prs.py)
            
            if [ "$RESULT" = "DONE" ]; then
              echo "No more pages to fetch"
              break
            fi
            CURSOR="$RESULT"
          done

      - name: Process PRs and update README
        env:
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: |
          python3 generate_svg.py


      - name: Commit if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md assets/
          git diff --cached --quiet || git commit -m "chore: update OSS contributions and telemetry dashboard [skip ci]"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git pull --rebase origin main
          git push