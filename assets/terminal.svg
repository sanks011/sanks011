<svg width="600" height="320" viewBox="0 0 600 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 600 12px 'Fira Code', 'Courier New', monospace; fill: #a78bfa; }
    .command { font: 500 14px 'Fira Code', 'Courier New', monospace; fill: #e2e8f0; }
    .key { font: 600 13px 'Fira Code', 'Courier New', monospace; fill: #8b5cf6; }
    .val { font: 400 13px 'Fira Code', 'Courier New', monospace; fill: #e2e8f0; }
    .accent { font: 600 13px 'Fira Code', 'Courier New', monospace; fill: #a78bfa; }
    .logo { font: 900 12px monospace; fill: #8b5cf6; }
    .cursor { fill: #8b5cf6; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="600" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0817" />
      <stop offset="100%" stop-color="#120e2e" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="600" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect x="10" y="10" width="580" height="300" rx="12" fill="#8b5cf6" opacity="0.15" filter="url(#glow)" />
  <rect x="10" y="10" width="580" height="300" rx="12" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  <path d="M10 22 C10 15.3726 15.3726 10 22 10 H578 C584.627 10 590 15.3726 590 22 V35 H10 V22 Z" fill="#0d0b21" />
  <line x1="10" y1="35" x2="590" y2="35" stroke="url(#borderGrad)" stroke-width="1" opacity="0.4" />

  <circle cx="28" cy="22" r="6" fill="#ef4444" />
  <circle cx="44" cy="22" r="6" fill="#f59e0b" />
  <circle cx="60" cy="22" r="6" fill="#10b981" />

  <text x="300" y="26" text-anchor="middle" class="title">sanks011@brainOS: ~</text>

  <text x="30" y="65" class="command">
    <tspan fill="#10b981">sanks011@brainOS</tspan><tspan fill="#e2e8f0">:</tspan><tspan fill="#8b5cf6">~</tspan><tspan fill="#e2e8f0">$ neofetch --caffeine</tspan>
  </text>
  
  <g transform="translate(30, 90)">
    <!-- Glowing Circuit Board Lines -->
    <path d="M 60 15 L 60 125
             M 60 35 C 30 25, 20 45, 20 55
             M 60 55 C 15 55, 15 85, 30 95
             M 60 75 C 30 85, 40 105, 60 115
             M 60 35 C 90 25, 100 45, 100 55
             M 60 55 C 105 55, 105 85, 90 95
             M 60 75 C 90 85, 80 105, 60 115" 
          stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85" />
    
    <!-- Central CPU Chip Body -->
    <rect x="42" y="45" width="36" height="36" rx="6" fill="#0d0b21" stroke="#a78bfa" stroke-width="1.8" />
    <rect x="50" y="53" width="20" height="20" rx="3" fill="#8b5cf6" opacity="0.75" />
    
    <!-- CPU Chip Connection Pins -->
    <path d="M 36 53 H 42 M 36 63 H 42 M 36 73 H 42
             M 78 53 H 84 M 78 63 H 84 M 78 73 H 84
             M 50 39 V 45 M 60 39 V 45 M 70 39 V 45
             M 50 81 V 87 M 60 81 V 87 M 70 81 V 87" 
          stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" />
          
    <!-- Glowing circuit nodes -->
    <circle cx="20" cy="55" r="3.5" fill="#a78bfa" />
    <circle cx="30" cy="95" r="3.5" fill="#d946ef" />
    <circle cx="100" cy="55" r="3.5" fill="#a78bfa" />
    <circle cx="90" cy="95" r="3.5" fill="#d946ef" />
    <circle cx="60" cy="15" r="4.5" fill="#8b5cf6" />
    <circle cx="60" cy="125" r="4.5" fill="#8b5cf6" />
  </g>

  <g transform="translate(200, 95)">
    <text x="0" y="15" class="key">OS:<tspan class="val"> BrainOS v2.0-LTS (Overclocked)</tspan></text>
    <text x="0" y="35" class="key">Host:<tspan class="val"> Human-Silicon Hybrid</tspan></text>
    <text x="0" y="55" class="key">Uptime:<tspan class="val"> 22 Years (Developer Mode)</tspan></text>
    <text x="0" y="75" class="key">Shell:<tspan class="val"> zsh (Powered by LLMs &amp; Caffeine)</tspan></text>
    <text x="0" y="95" class="key">Focus:<tspan class="val"> Full-Stack, AI Engineering &amp; DBs</tspan></text>
    <text x="0" y="115" class="key">Stamina:<tspan class="val"> [</tspan><tspan fill="#8b5cf6">█████████████░░</tspan><tspan class="val">] 86%</tspan></text>
    <text x="0" y="135" class="key">Skill Perk:<tspan class="accent"> Neural Network Architect &amp; PR Merger</tspan></text>
    
    <text x="0" y="165" class="command">
      <tspan fill="#10b981">sanks011@brainOS</tspan><tspan fill="#e2e8f0">:</tspan><tspan fill="#8b5cf6">~</tspan><tspan fill="#e2e8f0">$ </tspan><rect x="162" y="152" width="8" height="15" class="cursor" />
    </text>
  </g>
</svg>
