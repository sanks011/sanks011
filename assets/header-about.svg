<svg width="250" height="45" viewBox="0 0 250 45" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title-text { font: 800 14px 'Inter', system-ui, sans-serif; fill: #ffffff; letter-spacing: 2px; }
    .subtitle-text { font: 500 8px monospace; fill: #a78bfa; letter-spacing: 1.5px; opacity: 0.8; }
  </style>
  <!-- Icon: About Me (Glowing user avatar node) -->
  <g transform="translate(5, 7)">
    <circle cx="15" cy="15" r="14" stroke="#8b5cf6" stroke-width="1.5" fill="#0d0b21" />
    <circle cx="15" cy="12" r="4.5" stroke="#a78bfa" stroke-width="1.5" fill="none" />
    <path d="M 8 23.5 C 10 18.5, 20 18.5, 22 23.5" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" fill="none" />
    <circle cx="15" cy="15" r="1" fill="#d946ef" />
  </g>
  <!-- Header Text -->
  <text x="45" y="22" class="title-text">ABOUT ME</text>
  <text x="45" y="34" class="subtitle-text">SYSTEM PROFILE LOG</text>
  <!-- Accent Line -->
  <line x1="45" y1="40" x2="200" y2="40" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="100 5" />
  <circle cx="200" cy="40" r="2" fill="#d946ef" />
</svg>
