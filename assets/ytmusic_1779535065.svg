<svg width="480" height="140" viewBox="0 0 480 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .song-title { font: 700 15px 'Inter', system-ui, sans-serif; fill: #ffffff; }
    .artist { font: 500 12px 'Inter', system-ui, sans-serif; fill: #a78bfa; }
    .time { font: 500 10px monospace; fill: #94a3b8; }
    .badge { font: 600 9px monospace; fill: #94a3b8; letter-spacing: 1px; }
    .vinyl-record { transform-origin: 60px 70px; animation: spin 4s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="480" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0817" />
      <stop offset="100%" stop-color="#1a050d" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="480" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff0033" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing background drop shadow -->
  <rect x="8" y="8" width="464" height="124" rx="16" fill="#ff0033" opacity="0.1" filter="url(#glow)" />

  <!-- Main Player Container -->
  <rect x="8" y="8" width="464" height="124" rx="16" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  
    <g class="">
      <circle cx="60" cy="70" r="42" fill="#18142c" stroke="#ff0033" stroke-width="1.5" />
      <circle cx="60" cy="70" r="35" fill="#0d0a1b" stroke="#3a1a20" stroke-width="0.5" />
      <clipPath id="circle-art-clip">
        <circle cx="60" cy="70" r="28" />
      </clipPath>
      <image href="data:image/png;base64," x="32" y="42" width="56" height="56" clip-path="url(#circle-art-clip)"/>
      <circle cx="60" cy="70" r="28" fill="none" stroke="#2e2b42" stroke-width="0.5" stroke-dasharray="8 4" />
      <circle cx="60" cy="70" r="20" fill="none" stroke="#2e2b42" stroke-width="0.3" stroke-dasharray="3 3" />
      <circle cx="60" cy="70" r="6" fill="#0d0a1b" stroke="#ff0033" stroke-width="0.5" />
      <circle cx="60" cy="70" r="1.5" fill="#ffffff" />
    </g>

  <!-- Track Information -->
  <g transform="translate(120, 28)">
    <!-- Dynamic Playing Badge -->
    <rect x="0" y="0" width="120" height="18" rx="9" fill="rgba(148, 163, 184, 0.1)" />
    <circle cx="11" cy="9" r="3.5" fill="#94a3b8">
      
    </circle>
    <text x="22" y="10" dominant-baseline="middle" class="badge">RECENTLY PLAYED</text>

    <!-- Song Title -->
    <text x="0" y="36" class="song-title">Chand Mera Dil (Title Track)</text>

    <!-- Artist Info -->
    <text x="0" y="52" class="artist">Sachin-Jigar, Faheem Abdullah, &amp; A...</text>
  </g>

  <!-- Player Controls (Bottom Progress Section) -->
  <g transform="translate(120, 95)">
    <!-- Progress Bar Background -->
    <rect x="0" y="6" width="260" height="4" rx="2" fill="#334155" />
    <!-- Active Progress Bar -->
    <rect x="0" y="6" width="0" height="4" rx="2" fill="#ff0033">
      
    </rect>
    <!-- Active slider node -->
    <circle cx="0" cy="8" r="5" fill="#ffffff">
      
    </circle>

    <!-- Track Timers -->
    <text x="0" y="24" class="time">0:00</text>
    <text x="260" y="24" text-anchor="end" class="time">3:30</text>
  </g>

  <!-- Interactive Control Icons -->
  <g transform="translate(395, 78)" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Skip Back -->
    <path d="M 4 6 L 4 18 M 12 6 L 6 12 L 12 18" stroke="#94a3b8" />
    <!-- Play/Pause Button -->
    <circle cx="28" cy="12" r="10" fill="#ff0033" fill-opacity="0.1" stroke="#ff0033" />
    <path d="M 25 8 V 16 M 31 8 V 16" stroke="#ff0033" stroke-width="2" />
    <!-- Skip Forward -->
    <path d="M 44 6 L 50 12 L 44 18" />
    <path d="M 52 6 L 52 18" />
  </g>

  <!-- YT Music Brand Logo -->
  <g transform="translate(444, 14)">
    <image href="data:image/png;base64," x="0" y="0" width="24" height="24" />
  </g>
</svg>