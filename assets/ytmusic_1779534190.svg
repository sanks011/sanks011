<svg width="480" height="140" viewBox="0 0 480 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .song-title { font: 700 14px 'Inter', system-ui, sans-serif; fill: #ffffff; }
    .artist { font: 500 11.5px 'Inter', system-ui, sans-serif; fill: #a78bfa; }
    .time { font: 500 9px monospace; fill: #94a3b8; }
    .badge { font: 600 8.5px monospace; fill: #94a3b8; letter-spacing: 1px; }
    .vinyl-record { transform-origin: 60px 70px; animation: spin 8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="480" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0817" />
      <stop offset="100%" stop-color="#0e1a12" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="480" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1db954" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing background shadow -->
  <rect x="8" y="8" width="464" height="124" rx="16" fill="#1db954" opacity="0.08" filter="url(#glow)" />

  <!-- Main Player Container -->
  <rect x="8" y="8" width="464" height="124" rx="16" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  
    <g class="">
      <circle cx="60" cy="70" r="42" fill="#18142c" stroke="#1db954" stroke-width="1.5" />
      <circle cx="60" cy="70" r="35" fill="#0d0a1b" stroke="#1a3a2a" stroke-width="0.5" />
      <clipPath id="circle-art-clip">
        <circle cx="60" cy="70" r="28" />
      </clipPath>
      <image href="data:image/png;base64," x="32" y="42" width="56" height="56" clip-path="url(#circle-art-clip)"/>
      <circle cx="60" cy="70" r="28" fill="none" stroke="#2e2b42" stroke-width="0.5" stroke-dasharray="8 4" />
      <circle cx="60" cy="70" r="20" fill="none" stroke="#2e2b42" stroke-width="0.3" stroke-dasharray="3 3" />
      <circle cx="60" cy="70" r="6" fill="#0d0a1b" stroke="#1db954" stroke-width="0.5" />
      <circle cx="60" cy="70" r="1.5" fill="#ffffff" />
    </g>

  <!-- Track Information -->
  <g transform="translate(118, 26)">
    <!-- Status Badge -->
    <rect x="0" y="0" width="120" height="17" rx="8" fill="rgba(148, 163, 184, 0.1)" />
    <circle cx="10" cy="8.5" r="3" fill="#94a3b8">
      
    </circle>
    <text x="20" y="9" dominant-baseline="middle" class="badge">RECENTLY PLAYED</text>

    <!-- Song and Artist Details -->
    <text x="0" y="34" class="song-title">Chand Mera Dil (Title Track)</text>
    <text x="0" y="50" class="artist">Sachin-Jigar, Faheem Abdullah, &amp; A...</text>
  </g>

  <!-- Progress Bar -->
  <g transform="translate(118, 95)">
    <rect x="20" y="6" width="240" height="3" rx="1.5" fill="#1e293b" />
    <rect x="20" y="6" width="0" height="3" rx="1.5" fill="#1db954">
      
    </rect>
    <circle cx="20" cy="7.5" r="4" fill="#ffffff" opacity="0.9">
      
    </circle>
    <text x="20" y="22" class="time">0:00</text>
    <text x="260" y="22" text-anchor="end" class="time">3:30</text>
  </g>

  <!-- Equalizer Visualizer -->
  <g transform="translate(0, 96)">
    
    <rect x="420" y="10" width="3.5" height="14" fill="#1db954" rx="1.5" opacity="0.7">
      
    </rect>
    <rect x="426" y="4" width="3.5" height="20" fill="#1db954" rx="1.5" opacity="0.7">
      
    </rect>
    <rect x="432" y="14" width="3.5" height="10" fill="#1db954" rx="1.5" opacity="0.7">
      
    </rect>
    <rect x="438" y="6" width="3.5" height="18" fill="#1db954" rx="1.5" opacity="0.7">
      
    </rect>
    <rect x="444" y="16" width="3.5" height="8" fill="#1db954" rx="1.5" opacity="0.7">
      
    </rect>
    <rect x="450" y="2" width="3.5" height="22" fill="#1db954" rx="1.5" opacity="0.7">
      
    </rect>
    <rect x="456" y="12" width="3.5" height="12" fill="#1db954" rx="1.5" opacity="0.7">
      
    </rect>
    <rect x="462" y="8" width="3.5" height="16" fill="#1db954" rx="1.5" opacity="0.7">
      
    </rect>
  </g>

  <!-- YT Music Brand Logo -->
  <g transform="translate(440, 18)">
    <circle cx="12" cy="12" r="11" fill="#ff0000" />
    <circle cx="12" cy="12" r="7" fill="#0a0817" stroke="#ff0000" stroke-width="0.8" />
    <path d="M 10.5 9 L 15.5 12 L 10.5 15 Z" fill="#ffffff" />
  </g>
</svg>