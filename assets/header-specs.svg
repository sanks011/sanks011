<svg width="270" height="45" viewBox="0 0 270 45" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title-text { font: 800 14px 'Inter', system-ui, sans-serif; fill: #ffffff; letter-spacing: 2px; }
    .subtitle-text { font: 500 8px monospace; fill: #a78bfa; letter-spacing: 1.5px; opacity: 0.8; }
  </style>
  <!-- Icon: Specs (API Code block / Gear) -->
