<svg width="280" height="45" viewBox="0 0 280 45" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title-text { font: 800 14px 'Inter', system-ui, sans-serif; fill: #ffffff; letter-spacing: 2px; }
    .subtitle-text { font: 500 8px monospace; fill: #a78bfa; letter-spacing: 1.5px; opacity: 0.8; }
  </style>
  <!-- Icon: Ventures (Rocket / Growth node) -->
  <g transform="translate(5, 7)">
    <circle cx="15" cy="15" r="14" stroke="#8b5cf6" stroke-width="1.5" fill="#0d0b21" />
    <!-- Rocket vector -->
    <path d="M 15 7 L 18 13 L 18 19 L 15 22 L 12 19 L 12 13 Z" stroke="#a78bfa" stroke-width="1.5" stroke-linejoin="round" fill="none" />
    <path d="M 12 16 L 9 19 M 18 16 L 21 19" stroke="#d946ef" stroke-width="1.2" />
  </g>
  <!-- Header Text -->
  <text x="45" y="22" class="title-text">FEATURED VENTURES</text>
  <text x="45" y="34" class="subtitle-text">ACTIVE SYSTEM DEPLOYMENTS</text>
  <!-- Accent Line -->
  <line x1="45" y1="40" x2="230" y2="40" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="120 5" />
  <circle cx="230" cy="40" r="2" fill="#d946ef" />
</svg>
