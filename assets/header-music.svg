<svg width="280" height="45" viewBox="0 0 280 45" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title-text { font: 800 14px 'Inter', system-ui, sans-serif; fill: #ffffff; letter-spacing: 2px; }
    .subtitle-text { font: 500 8px monospace; fill: #a78bfa; letter-spacing: 1.5px; opacity: 0.8; }
  </style>
  <!-- Icon: Audio Headset Node -->
  <g transform="translate(5, 7)">
    <circle cx="15" cy="15" r="14" stroke="#ff0000" stroke-width="1.5" fill="#0d0b21" />
    <path d="M 9 17 L 9 13 C 9 10, 21 10, 21 13 L 21 17" stroke="#ff0000" stroke-width="1.5" stroke-linecap="round" fill="none" />
    <rect x="7" y="15" width="4" height="4" rx="1.5" fill="#a78bfa" />
    <rect x="19" y="15" width="4" height="4" rx="1.5" fill="#a78bfa" />
    <circle cx="15" cy="15" r="1.5" fill="#ff0000" />
  </g>
  <!-- Header Text -->
  <text x="45" y="22" class="title-text">LIVE MUSIC STREAM</text>
  <text x="45" y="34" class="subtitle-text">YOUTUBE MUSIC AUDIO NODE</text>
  <!-- Accent Line -->
  <line x1="45" y1="40" x2="230" y2="40" stroke="#ff0000" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="100 5" />
  <circle cx="230" cy="40" r="2" fill="#a78bfa" />
</svg>
