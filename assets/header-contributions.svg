<svg width="270" height="45" viewBox="0 0 270 45" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title-text { font: 800 14px 'Inter', system-ui, sans-serif; fill: #ffffff; letter-spacing: 2px; }
    .subtitle-text { font: 500 8px monospace; fill: #a78bfa; letter-spacing: 1.5px; opacity: 0.8; }
  </style>
  <!-- Icon: Contributions (Git Merge / Branch) -->
  <g transform="translate(5, 7)">
    <circle cx="15" cy="15" r="14" stroke="#8b5cf6" stroke-width="1.5" fill="#0d0b21" />
    <circle cx="12" cy="10" r="2.5" stroke="#a78bfa" stroke-width="1.2" fill="none" />
    <circle cx="12" cy="20" r="2.5" stroke="#a78bfa" stroke-width="1.2" fill="none" />
    <circle cx="20" cy="15" r="2.5" stroke="#d946ef" stroke-width="1.2" fill="none" />
    <path d="M 12 12.5 L 12 17.5 M 12 15 C 15 15, 15 15, 17.5 15" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round" fill="none" />
  </g>
  <!-- Header Text -->
  <text x="45" y="22" class="title-text">OPEN SOURCE</text>
  <text x="45" y="34" class="subtitle-text">UPSTREAM CONTRIBUTIONS</text>
  <!-- Accent Line -->
  <line x1="45" y1="40" x2="220" y2="40" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="110 5" />
  <circle cx="220" cy="40" r="2" fill="#d946ef" />
</svg>
