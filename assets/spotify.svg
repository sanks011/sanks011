<svg width="480" height="140" viewBox="0 0 480 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .song-title { font: 700 15px 'Inter', system-ui, sans-serif; fill: #ffffff; }
    .artist { font: 500 12px 'Inter', system-ui, sans-serif; fill: #a78bfa; }
    .time { font: 500 10px monospace; fill: #94a3b8; }
    .badge { font: 600 9px monospace; fill: #1db954; letter-spacing: 1px; }
    .playing-bar { fill: #1db954; animation: play 4s linear infinite; }
    .vinyl-record { transform-origin: 60px 70px; animation: spin 4s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="480" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0817" />
      <stop offset="100%" stop-color="#120e2e" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="480" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1db954" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing background drop shadow -->
  <rect x="8" y="8" width="464" height="124" rx="16" fill="#1db954" opacity="0.1" filter="url(#glow)" />

  <!-- Main Player Container -->
  <rect x="8" y="8" width="464" height="124" rx="16" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />

  <!-- Album Art: Glowing Spinning Vinyl Record -->
  <!-- Vinyl Outer Ring -->
  <circle class="vinyl-record" cx="60" cy="70" r="42" fill="#18142c" stroke="#8b5cf6" stroke-width="2" />
  <circle class="vinyl-record" cx="60" cy="70" r="32" fill="#0d0a1b" stroke="#3b0764" stroke-width="1" />
  <!-- Vinyl Ridges -->
  <circle class="vinyl-record" cx="60" cy="70" r="24" fill="none" stroke="#2e2b42" stroke-width="0.5" stroke-dasharray="10 5" />
  <circle class="vinyl-record" cx="60" cy="70" r="16" fill="none" stroke="#2e2b42" stroke-width="0.5" stroke-dasharray="4 2" />
  <!-- Center Label (Green Spotify style) -->
  <circle class="vinyl-record" cx="60" cy="70" r="12" fill="#1db954" />
  <circle class="vinyl-record" cx="60" cy="70" r="3" fill="#0d0a1b" />

  <!-- Track Information -->
  <g transform="translate(120, 28)">
    <!-- Dynamic Playing Badge -->
    <rect x="0" y="0" width="85" height="16" rx="8" fill="#1db954" fill-opacity="0.12" />
    <circle cx="10" cy="8" r="3.5" fill="#1db954" />
    <text x="22" y="11" class="badge">CODING VIBE</text>

    <!-- Song Title -->
    <text x="0" y="36" class="song-title">Caffeine &amp; Neural Networks</text>
    
    <!-- Artist Info -->
    <text x="0" y="52" class="artist">Sankalpa Sarkar — Dev Focus Vibe</text>
  </g>

  <!-- Player Controls (Bottom Progress Section) -->
  <g transform="translate(120, 95)">
    <!-- Progress Bar Background -->
    <rect x="0" y="6" width="260" height="4" rx="2" fill="#334155" />
    <!-- Active Progress Bar -->
    <rect x="0" y="6" width="168" height="4" rx="2" fill="#1db954" />
    <!-- Active slider node -->
    <circle cx="168" cy="8" r="5" fill="#ffffff" />
    
    <!-- Track Timers -->
    <text x="0" y="24" class="time">02:18</text>
    <text x="260" y="24" text-anchor="end" class="time">03:36</text>
  </g>

  <!-- Spotify Brand Accent Icon (Right Aligned) -->
  <g transform="translate(415, 20)">
    <circle cx="15" cy="15" r="14" fill="#1db954" />
    <!-- Wave 1 -->
    <path d="M 7.5 11 C 12 8.5, 18 8.5, 22.5 11" stroke="#0a0817" stroke-width="2.5" stroke-linecap="round" fill="none" />
    <!-- Wave 2 -->
    <path d="M 9 15 C 13 13, 17 13, 21 15" stroke="#0a0817" stroke-width="2" stroke-linecap="round" fill="none" />
    <!-- Wave 3 -->
    <path d="M 10.5 19 C 13.5 17.5, 16.5 17.5, 19.5 19" stroke="#0a0817" stroke-width="1.8" stroke-linecap="round" fill="none" />
  </g>

  <!-- Interactive Control Icons Overlay (Play / Skip / Shuffle) -->
  <g transform="translate(400, 78)" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Skip Back -->
    <path d="M 5 6 L 5 18 M 15 6 L 9 12 L 15 18" stroke="#94a3b8" />
    <!-- Play/Pause Button -->
    <circle cx="28" cy="12" r="9" fill="#1db954" fill-opacity="0.1" stroke="#1db954" />
    <path d="M 26 9 V 15 M 30 9 V 15" stroke="#1db954" stroke-width="2" />
    <!-- Skip Forward -->
    <path d="M 45 6 L 45 18 M 35 6 L 41 12 L 35 18" />
  </g>
</svg>
